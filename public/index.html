<!DOCTYPE html>
<html>
<head>
<title>Florawings Chat</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
}

.sidebar{
width:200px;
background:#1f2a3a;
color:white;
padding:10px;
}

.room{
padding:10px;
background:#2f3f55;
margin-bottom:5px;
cursor:pointer;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
padding:10px;
overflow:auto;
}

.input{
display:flex;
border-top:1px solid #ccc;
}

.input input{
flex:1;
padding:10px;
border:none;
}

.input button{
padding:10px;
background:#4CAF50;
color:white;
border:none;
}

</style>

</head>
<body>

<div class="sidebar">

<h3>Rooms</h3>

<div class="room" onclick="joinRoom('Main room')">Main room</div>
<div class="room" onclick="joinRoom('Adult room')">Adult room</div>
<div class="room" onclick="joinRoom('Hindi room')">Hindi room</div>

</div>

<div class="chat">

<div id="messages" class="messages"></div>

<div class="input">

<input id="msg" placeholder="Type message...">

<button onclick="send()">Send</button>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

let name = prompt("Enter name") || "Guest_" + Math.floor(Math.random()*1000)

let currentRoom = "Main room"

joinRoom(currentRoom)

function joinRoom(room){

currentRoom = room

socket.emit("join",{name:name,room:room})

}

function send(){

let msg = document.getElementById("msg").value

socket.emit("chat",msg)

document.getElementById("msg").value=""

}

socket.on("chat",(data)=>{

let div=document.createElement("div")

div.innerHTML="<b>"+data.name+":</b> "+data.msg

document.getElementById("messages").appendChild(div)

})

socket.on("system",(msg)=>{

let div=document.createElement("div")

div.innerHTML="<i>"+msg+"</i>"

document.getElementById("messages").appendChild(div)

})

</script>

</body>
</html>
