<!DOCTYPE html>
<html>
<head>

<title>Florawings Chat</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://images.unsplash.com/photo-1529156069898-49953e39b3ac") center/cover;
}

.box{
background:rgba(255,255,255,0.9);
padding:40px;
border-radius:10px;
text-align:center;
width:280px;
}

h1{
margin-top:0;
color:#e91e63;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.login{
background:#4CAF50;
color:white;
}

.guest{
background:black;
color:white;
}

.register{
background:#2196F3;
color:white;
}

</style>

</head>

<body>

<div class="box">

<h1>Florawings Chat</h1>

<input id="user" placeholder="Username" style="width:100%;padding:10px;margin-top:10px">

<input id="pass" placeholder="Password" type="password" style="width:100%;padding:10px;margin-top:10px">

<button class="login" onclick="login()">Login</button>

<button class="guest" onclick="guest()">Guest Login</button>

<button class="register" onclick="register()">Register</button>

</div>

<script>

function login(){
localStorage.setItem("name",document.getElementById("user").value)
location.href="/"
}

function guest(){
let g="Guest_"+Math.floor(Math.random()*1000)
localStorage.setItem("name",g)
location.href="/"
}

function register(){
alert("Register system next step me banega")
}

</script>

</body>
</html>
