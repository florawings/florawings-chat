<!DOCTYPE html>
<html>
<head>
<title>Florawings Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f1f3f6;
}

.container{
display:flex;
height:100vh;
}

/* rooms */

.rooms{
width:200px;
background:#1f2937;
color:white;
padding:10px;
}

.room{
padding:8px;
background:#374151;
margin-bottom:5px;
cursor:pointer;
}

/* chat */

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
background:white;
}

.input{
display:flex;
border-top:1px solid #ccc;
}

.input input{
flex:1;
padding:10px;
border:none;
}

.input button{
padding:10px;
background:#6366f1;
color:white;
border:none;
}

</style>
</head>

<body>

<script>

if(!localStorage.getItem("user")){
location="/login.html"
}

</script>

<div class="container">

<div class="rooms">

<h3>Rooms</h3>

<div class="room" onclick="joinRoom('main')">Main room</div>
<div class="room" onclick="joinRoom('adult')">Adult room</div>
<div class="room" onclick="joinRoom('hindi')">Hindi room</div>

</div>

<div class="chat">

<div id="chat" class="messages"></div>

<div class="input">
<input id="msg" placeholder="Message">
<button onclick="send()">Send</button>
</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

const name = localStorage.getItem("user")

let room="main"

socket.emit("join",{name,room})

function joinRoom(r){

room=r

socket.emit("join",{name,room})

}

function send(){

const msg=document.getElementById("msg").value

socket.emit("chat",msg)

document.getElementById("msg").value=""

}

socket.on("chat",(data)=>{

const div=document.createElement("div")

div.innerText=data.name+": "+data.msg

document.getElementById("chat").appendChild(div)

})

socket.on("system",(msg)=>{

const div=document.createElement("div")

div.innerText=msg

document.getElementById("chat").appendChild(div)

})

</script>

</body>
</html>
