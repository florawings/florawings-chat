<!DOCTYPE html>
<html>

<head>

<title>Florawings Chat</title>

<style>

body{
font-family:Arial;
background:#f0f2f5;
margin:0;
}

#chat{
height:70vh;
overflow:auto;
background:white;
padding:10px;
}

.msg{
margin-bottom:6px;
}

button{
background:#6366f1;
color:white;
border:none;
padding:6px 12px;
}

</style>

</head>

<body>

<h2>Florawings Chat</h2>

<input id="name" placeholder="Name">

<input id="msg" placeholder="message">

<button onclick="send()">Send</button>

<div id="chat"></div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

let myName = "Guest_"+Math.floor(Math.random()*1000)

socket.emit("join","main")

function send(){

const msg = document.getElementById("msg").value

socket.emit("chat",{msg})

}

socket.on("chat",(data)=>{

const div = document.createElement("div")

div.className="msg"

div.innerHTML =
`<span style="color:${data.color}">
${data.name}: ${data.msg}
</span>
<button onclick="del(${data.id})">x</button>`

document.getElementById("chat").appendChild(div)

})

function del(id){

socket.emit("deleteMsg",id)

}

socket.on("deleteMsg",(id)=>{

location.reload()

})

socket.on("system",(msg)=>{

const div = document.createElement("div")

div.innerText = msg

document.getElementById("chat").appendChild(div)

})

</script>

</body>

</html>
