<!DOCTYPE html>
<html>
<head>
<title>Florawings Chat</title>
</head>

<body>

<h2>Florawings Chat</h2>

<input id="name" placeholder="Name">
<input id="room" placeholder="Room">
<button id="joinBtn">Join</button>

<br><br>

<input id="msg" placeholder="Message">
<button id="sendBtn">Send</button>

<div id="chat" style="height:300px;border:1px solid #ccc;overflow:auto;padding:10px;"></div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let myName = "";
let myRoom = "";

/* Join room */
document.getElementById("joinBtn").onclick = function(){
  myName = document.getElementById("name").value;
  myRoom = document.getElementById("room").value;

  socket.emit("join",{name:myName, room:myRoom});
};

/* Send message */
document.getElementById("sendBtn").onclick = function(){
  const msg = document.getElementById("msg").value;

  socket.emit("chat",{
    name: myName,
    msg: msg
  });

  document.getElementById("msg").value = "";
};

/* Receive chat */
socket.on("chat",(data)=>{
  const div = document.createElement("div");
  div.innerText = data.name + ": " + data.msg;
  document.getElementById("chat").appendChild(div);
});

/* System messages */
socket.on("system",(msg)=>{
  const div = document.createElement("div");
  div.innerText = msg;
  document.getElementById("chat").appendChild(div);
});
</script>

</body>
</html>
