<!DOCTYPE html>
<html>
<head>
<title>Florawings Chat</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
background:url("https://images.unsplash.com/photo-1529156069898-49953e39b3ac") center/cover;
}

.loginBox{
width:320px;
margin:auto;
margin-top:120px;
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:8px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
color:white;
cursor:pointer;
}

.login{background:#4CAF50;}
.guest{background:black;}
.register{background:#2196F3;}

.chat{
display:none;
height:100vh;
}

.sidebar{
width:200px;
background:#1f2a3a;
color:white;
float:left;
height:100%;
padding:10px;
}

.messages{
margin-left:200px;
height:90%;
overflow:auto;
padding:10px;
background:#f0f0f0;
}

.sendBox{
position:fixed;
bottom:0;
left:200px;
right:0;
background:white;
padding:10px;
}

</style>

<script src="/socket.io/socket.io.js"></script>

</head>

<body>

<div class="loginBox" id="login">

<h2>Florawings Chat</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button class="login" onclick="login()">Login</button>

<button class="guest" onclick="guest()">Guest Login</button>

<button class="register" onclick="registerPage()">Register</button>

</div>

<div class="chat" id="chat">

<div class="sidebar">
<h3>Rooms</h3>
<div>Main room</div>
<div>Adult room</div>
<div>Hindi room</div>
</div>

<div class="messages" id="messages"></div>

<div class="sendBox">
<input id="msg" placeholder="message">
<button onclick="send()">Send</button>
</div>

</div>

<script>

let socket;
let name;

function login(){

name=document.getElementById("username").value;

if(!name){
alert("Enter username");
return;
}

startChat();

}

function guest(){

name="Guest_"+Math.floor(Math.random()*9999);

startChat();

}

function registerPage(){

window.location.href="/login.html";

}

function startChat(){

document.getElementById("login").style.display="none";
document.getElementById("chat").style.display="block";

socket=io();

socket.emit("join",name);

socket.on("system",(msg)=>{

addMsg(msg);

});

socket.on("chat",(data)=>{

addMsg(data.name+": "+data.msg);

});

}

function send(){

let msg=document.getElementById("msg").value;

socket.emit("chat",msg);

document.getElementById("msg").value="";

}

function addMsg(m){

let div=document.createElement("div");

div.innerText=m;

document.getElementById("messages").appendChild(div);

}

</script>

</body>
</html>
