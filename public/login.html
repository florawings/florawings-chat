<!DOCTYPE html>
<html>
<head>
<title>Florawings Chat Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#1f2937;
padding:30px;
width:320px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
font-weight:bold;
}

.login{background:#22c55e;color:white;}
.guest{background:#6366f1;color:white;}
.register{background:#f59e0b;color:white;}

</style>
</head>

<body>

<div class="box">

<h2>Florawings Chat</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button class="login" onclick="login()">Login</button>

<button class="guest" onclick="guest()">Guest Login</button>

<button class="register" onclick="register()">Register</button>

</div>

<script>

function login(){
localStorage.setItem("user",document.getElementById("user").value)
window.location="/"
}

function guest(){
const guest="Guest_"+Math.floor(Math.random()*9999)
localStorage.setItem("user",guest)
window.location="/"
}

function register(){
alert("Register system next step me banega")
}

</script>

</body>
</html>
