<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Florawings Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.box{
background:white;
padding:25px;
width:320px;
border-radius:10px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

input{
width:100%;
padding:10px;
margin-top:8px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.login{background:#22c55e;}
.guest{background:black;}
.register{background:#3b82f6;}

</style>
</head>

<body>

<div class="box">

<h2>Florawings Chat</h2>

<input id="name" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button class="login" onclick="login()">Login</button>

<button class="guest" onclick="guest()">Guest Login</button>

<button class="register" onclick="register()">Register</button>

</div>

<script>

function login(){

let name=document.getElementById("name").value;

if(!name){
alert("Enter username");
return;
}

localStorage.setItem("name",name);

window.location.href="/";

}

function guest(){

let g="Guest_"+Math.floor(Math.random()*9999);

localStorage.setItem("name",g);

window.location.href="/";

}

function register(){

alert("Register form next step me add hoga");

}

</script>

</body>
</html>
