<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Florawings Chat</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:sans-serif;
background:url("https://images.unsplash.com/photo-1529156069898-49953e39b3ac") no-repeat center;
background-size:cover;
}

.box{
background:white;
padding:25px;
width:280px;
text-align:center;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h2{
color:#e91e63;
margin-bottom:15px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
color:white;
cursor:pointer;
}

.login{background:#4CAF50;}
.guest{background:black;}
.register{background:#2196F3;}

</style>
</head>

<body>

<div class="box">

<h2>Florawings Chat</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button class="login" onclick="login()">Login</button>
<button class="guest" onclick="guest()">Guest Login</button>
<button class="register" onclick="register()">Register</button>

</div>

<script>

function login(){
let name=document.getElementById("username").value
localStorage.setItem("chatname",name)
window.location="index.html"
}

function guest(){
let name="Guest"+Math.floor(Math.random()*1000)
localStorage.setItem("chatname",name)
window.location="index.html"
}

function register(){
alert("Register page next step me banega")
}

</script>

</body>
</html>
